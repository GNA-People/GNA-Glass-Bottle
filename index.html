function hashId(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
  return h;
}
function getAnim(b) {
  const variant = b.anim != null ? b.anim : hashId(b.id) % ANIM_PRESETS.length;
  const speed = b.speed || 1;
  const base = ANIM_PRESETS[variant];
  return { ...base, dur: +(base.dur * speed).toFixed(2) };
}
function getPos(b) {
  if (b.x != null && b.y != null) return { x: b.x, y: b.y };
  const h = hashId(b.id);
  return { x: 160 + (h % (WORLD_W - 320)), y: 300 + (Math.floor(h / 7) % (WORLD_H - 460)) };
}

function placeDecor(bottles) {
  const bpos = bottles.map(getPos);
  const placed = [];
  function ok(x, y, s) {
    const padX = s / 2 + 74, padY = s / 2 + 108;
    for (const b of bpos) if (Math.abs(x - b.x) < padX && Math.abs(y - b.y) < padY) return false;
    for (const d of placed) {
      const gap = (s + d.s) / 2 + 32;
      if (Math.abs(x - d.x) < gap && Math.abs(y - d.y) < gap) return false;
    }
    return true;
  }
  for (const item of DECOR_TYPES) {
    for (let t = 0; t < 120; t++) {
      const x = item.water ? 90 + Math.random() * (WORLD_W - 180) : 110 + Math.random() * (WORLD_W - 220);
      const y = item.water ? 40 + Math.random() * (SEA_H - 90) : SEA_H + 70 + Math.random() * (WORLD_H - SEA_H - 200);
      if (ok(x, y, item.s)) {
        placed.push({ ...item, x: Math.round(x), y: Math.round(y), delay: +(Math.random() * 2.5).toFixed(2), dur: +(2.6 + Math.random() * 2.4).toFixed(2) });
        break;
      }
    }
  }
  return placed;
}

function generateFootprints() {
  const fps = [];
  const trails = 4;
  for (let t = 0; t < trails; t++) {
    let sx = 200 + Math.random() * (WORLD_W - 400);
    let sy = SEA_H + 120 + Math.random() * (WORLD_H - SEA_H - 320);
    const ang = Math.random() * Math.PI * 2;
    const steps = 7 + Math.floor(Math.random() * 6);
    for (let i = 0; i < steps; i++) {
      const px = sx + Math.cos(ang) * 46 * i;
      const py = sy + Math.sin(ang) * 46 * i;
      if (px < 60 || px > WORLD_W - 60 || py < SEA_H + 40 || py > WORLD_H - 60) break;
      const side = i % 2 === 0 ? 1 : -1;
      const ox = Math.cos(ang + Math.PI / 2) * 9 * side;
      const oy = Math.sin(ang + Math.PI / 2) * 9 * side;
      fps.push({ x: Math.round(px + ox), y: Math.round(py + oy), a: Math.round((ang * 180) / Math.PI) });
    }
  }
  return fps;
}

const SB_HEADERS = {
  apikey: SUPABASE_ANON_KEY,
  "Content-Type": "application/json",
};
const supaStorage = {
  async get(key, shared) {
    if (!shared) {
      try { const v = localStorage.getItem(key); return v != null ? { key, value: v, shared: false } : null; } catch (e) { return null; }
    }
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/kv?key=eq.${encodeURIComponent(key)}&select=val`, { headers: SB_HEADERS });
      if (!res.ok) return null;
      const rows = await res.json();
      return rows[0] ? { key, value: rows[0].val, shared: true } : null;
    } catch (e) { return null; }
  },
  async set(key, value, shared) {
    if (!shared) { try { localStorage.setItem(key, value); } catch (e) {} return { key, value, shared: false }; }
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/kv`, { method: "POST", headers: { ...SB_HEADERS, Prefer: "resolution=merge-duplicates,return=minimal" }, body: JSON.stringify({ key, val: value }) });
    } catch (e) {}
    return { key, value, shared: true };
  },
  async delete(key, shared) {
    if (!shared) { try { localStorage.removeItem(key); } catch (e) {} return { key, deleted: true }; }
    try { await fetch(`${SUPABASE_URL}/rest/v1/kv?key=eq.${encodeURIComponent(key)}`, { method: "DELETE", headers: SB_HEADERS }); } catch (e) {}
    return { key, deleted: true };
  },
  async list(prefix, shared) {
    if (!shared) return { keys: [] };
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/kv?key=like.${encodeURIComponent(prefix)}*&select=key`, { headers: SB_HEADERS });
      if (!res.ok) return { keys: [] };
      const rows = await res.json();
      return { keys: rows.map((r) => r.key) };
    } catch (e) { return { keys: [] }; }
  },
};
window.storage = supaStorage;

  const drag = useRef({ on: false, sx: 0, sy: 0, ox: 0, oy: 0, moved: false });
  const centered = useRef(false);
  const [hint, setHint] = useState(true);
  const [decor, setDecor] = useState([]);
  const [footprints] = useState(() => generateFootprints());

  const [soundOn, setSoundOn] = useState(false);
  const audioRef = useRef(null);

  const mmW = vp.w && vp.w < 480 ? 104 : 150;
  const mmH = Math.round((mmW * WORLD_H) / WORLD_W);
  const ms = mmW / WORLD_W;
  const mmPressed = useRef(false);

  function clampPanZ(p, z) {
    const minX = Math.min(0, vp.w - WORLD_W * z), minY = Math.min(0, vp.h - WORLD_H * z);
    return { x: Math.max(minX, Math.min(0, p.x)), y: Math.max(minY, Math.min(0, p.y)) };
  }
  const clampPan = (p) => clampPanZ(p, zoom);
  const minZoom = vp.w && vp.h ? Math.max(vp.w / WORLD_W, vp.h / WORLD_H) : 0.5;
  const maxZoom = Math.max(1.6, minZoom + 0.4);

  useEffect(() => { loadAll(); return () => stopSound(); }, []);
  useEffect(() => { const t = setTimeout(() => setLoading(false), 4000); return () => clearTimeout(t); }, []);

  useEffect(() => {
    if (!intro) return;
    if (introStep === "beach") { const t = setTimeout(() => setIntroStep("bottle"), 4500); return () => clearTimeout(t); }
    if (introStep === "pop") { const t = setTimeout(() => setIntroStep("letter"), ANIM_PRESETS[1].dur * 1000 + 250); return () => clearTimeout(t); }
  }, [intro, introStep]);

  const posKey = bottles.map((b) => { const p = getPos(b); return b.id + ":" + p.x + ":" + p.y; }).sort().join("|");
  useEffect(() => { if (!loading) setDecor(placeDecor(bottles)); }, [posKey, loading]);

  useEffect(() => {
    function measure() { if (vpRef.current) { const r = vpRef.current.getBoundingClientRect(); setVp({ w: r.width, h: r.height }); } }
    measure();
    window.addEventListener("resize", measure);
    return () => window.removeEventListener("resize", measure);
  }, []);

  useEffect(() => {
    if (!vp.w) return;
    const mz = Math.max(vp.w / WORLD_W, vp.h / WORLD_H);
    const mxz = Math.max(1.6, mz + 0.4);
    if (!centered.current) {
      centered.current = true;
      const z0 = Math.min(Math.max(1, mz), mxz);
      setZoom(z0);
      setPan(clampPanZ({ x: (vp.w - WORLD_W * z0) / 2, y: (vp.h - WORLD_H * z0) / 2.4 }, z0));
    } else {
      const nz = Math.min(Math.max(zoom, mz), mxz);
      setZoom(nz);
      setPan((p) => clampPanZ(p, nz));
    }
  }, [vp]);

  useEffect(() => {
    const minX = Math.min(0, vp.w - WORLD_W * zoom), minY = Math.min(0, vp.h - WORLD_H * zoom);
    const clamp = (p) => ({ x: Math.max(minX, Math.min(0, p.x)), y: Math.max(minY, Math.min(0, p.y)) });
    function move(e) {
      if (!drag.current.on) return;
      const dx = e.clientX - drag.current.sx, dy = e.clientY - drag.current.sy;
      if (Math.abs(dx) + Math.abs(dy) > 6) { drag.current.moved = true; setHint(false); }
      setPan(clamp({ x: drag.current.ox + dx, y: drag.current.oy + dy }));
    }
    function up() { drag.current.on = false; mmPressed.current = false; }
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
    return () => { window.removeEventListener("pointermove", move); window.removeEventListener("pointerup", up); };
  }, [vp, zoom]);

  function onPanStart(e) { drag.current = { on: true, sx: e.clientX, sy: e.clientY, ox: pan.x, oy: pan.y, moved: false }; }
  function recenter() { setPan(clampPan({ x: (vp.w - WORLD_W * zoom) / 2, y: (vp.h - WORLD_H * zoom) / 2.4 })); }
  function setZoomAround(z1) {
    const z0 = zoom, cx = vp.w / 2, cy = vp.h / 2;
    const wx = (cx - pan.x) / z0, wy = (cy - pan.y) / z0;
    setZoom(z1);
    setPan(clampPanZ({ x: cx - wx * z1, y: cy - wy * z1 }, z1));
  }
  function onWheel(e) {
    const dir = e.deltaY > 0 ? -0.12 : 0.12;
    setZoomAround(Math.max(minZoom, Math.min(maxZoom, +(zoom + dir).toFixed(2))));
  }
  function mmJump(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const wx = (e.clientX - rect.left) / ms, wy = (e.clientY - rect.top) / ms;
    setPan(clampPanZ({ x: vp.w / 2 - wx * zoom, y: vp.h / 2 - wy * zoom }, zoom));
  }

  function startSound() {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      const ac = new Ctx();
      const size = 2 * ac.sampleRate;
      const buffer = ac.createBuffer(1, size, ac.sampleRate);
      const data = buffer.getChannelData(0);
      let last = 0;
      for (let i = 0; i < size; i++) { const white = Math.random() * 2 - 1; last = (last + 0.02 * white) / 1.02; data[i] = last * 3.2; }
      const noise = ac.createBufferSource(); noise.buffer = buffer; noise.loop = true;
      const lp = ac.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 600;
      const master = ac.createGain(); master.gain.value = 0.1;
      noise.connect(lp); lp.connect(master); master.connect(ac.destination);
      const lfo = ac.createOscillator(); lfo.frequency.value = 0.11;
      const lfoGain = ac.createGain(); lfoGain.gain.value = 0.08;
      lfo.connect(lfoGain); lfoGain.connect(master.gain);
      const lfo2 = ac.createOscillator(); lfo2.frequency.value = 0.07;
      const lfo2Gain = ac.createGain(); lfo2Gain.gain.value = 320;
      lfo2.connect(lfo2Gain); lfo2Gain.connect(lp.frequency);
      const hiss = ac.createBufferSource(); hiss.buffer = buffer; hiss.loop = true;
      const bp = ac.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 3200; bp.Q.value = 0.7;
      const hissGain = ac.createGain(); hissGain.gain.value = 0.0;
      hiss.connect(bp); bp.connect(hissGain); hissGain.connect(ac.destination);
      const lfo3 = ac.createOscillator(); lfo3.frequency.value = 0.09;
      const lfo3Gain = ac.createGain(); lfo3Gain.gain.value = 0.03;
      const hissBase = ac.createConstantSource(); hissBase.offset.value = 0.03;
      lfo3.connect(lfo3Gain); lfo3Gain.connect(hissGain.gain); hissBase.connect(hissGain.gain);
      noise.start(); lfo.start(); lfo2.start(); hiss.start(); lfo3.start(); hissBase.start();
      audioRef.current = { ac, nodes: [noise, lfo, lfo2, hiss, lfo3, hissBase] };
    } catch (e) { console.error("사운드 실패", e); }
  }
  function stopSound() {
    const a = audioRef.current;
    if (a) { try { a.nodes.forEach((n) => n.stop && n.stop()); } catch (e) {} try { a.ac.close(); } catch (e) {} audioRef.current = null; }
  }
  function toggleSound() { if (soundOn) { stopSound(); setSoundOn(false); } else { startSound(); setSoundOn(true); } }

  async function loadAll() {
    setLoading(true);
    let id = "";
    try { const r = await window.storage.get("my-id", false); if (r) id = JSON.parse(r.value); } catch (e) {}
    if (!id) { id = "u_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8); try { await window.storage.set("my-id", JSON.stringify(id), false); } catch (e) {} }
    setMyId(id);
    try {
      const res = await window.storage.list("bottle:", true);
      const keys = (res && res.keys) || [];
      const loaded = [];
      for (const k of keys) { try { const r = await window.storage.get(k, true); if (r) loaded.push(JSON.parse(r.value)); } catch (e) {} }
      loaded.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      setBottles(loaded);
    } catch (e) { console.error("불러오기 실패", e); }
    try { const n = await window.storage.get("nickname", false); if (n) { const val = JSON.parse(n.value); setNickname(val); setFNick(val); } } catch (e) {}
    try { const mr = await window.storage.get("my-reactions", false); if (mr) setMyReactions(JSON.parse(mr.value)); } catch (e) {}
    setLoading(false);
  }

  function openCreate() { setEditId(null); setFTheme(""); setFItems(""); setFNick(nickname); setFColor(Math.floor(Math.random() * BOTTLE_COLORS.length)); setFCat("none"); setCreating(true); }
  function openEdit(b) { setEditId(b.id); setFTheme(b.theme); setFItems(b.items); setFNick(b.nickname); setFColor(b.colorIndex || 0); setFCat(b.category || "none"); setCreating(true); }

  async function saveBottle() {
    const theme = fTheme.trim(), items = fItems.trim();
    const nick = fNick.trim() || "익명의 GNA 주민";
    if (!theme || !items) return;
    if (editId) {
      try {
        const r = await window.storage.get("bottle:" + editId, true);
        const latest = r ? JSON.parse(r.value) : null;
        if (latest) {
          latest.theme = theme; latest.items = items; latest.nickname = nick; latest.colorIndex = catColorIndex(fCat); latest.category = fCat;
          await window.storage.set("bottle:" + editId, JSON.stringify(latest), true);
          setBottles((prev) => prev.map((b) => (b.id === editId ? latest : b)));
        }
        await window.storage.set("nickname", JSON.stringify(nick), false);
      } catch (e) { console.error("수정 실패", e); }
      setNickname(nick); setCreating(false); setEditId(null);
      return;
    }
    const id = "b_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
    const bx = 180 + Math.random() * (WORLD_W - 360);
    const by = SEA_H + 80 + Math.random() * (WORLD_H - SEA_H - 240);
    const bottle = {
      id, theme, items, nickname: nick, ownerId: myId, createdAt: Date.now(),
      reactions: { heart: 0, yum: 0, fire: 0, up: 0 }, comments: [], colorIndex: catColorIndex(fCat), category: fCat,
      bob: Math.random() * 3, tilt: Math.random() * 8 - 4,
      anim: Math.floor(Math.random() * ANIM_PRESETS.length), speed: +(0.85 + Math.random() * 0.4).toFixed(2),
      x: Math.round(bx), y: Math.round(by),
    };
    try { await window.storage.set("bottle:" + id, JSON.stringify(bottle), true); await window.storage.set("nickname", JSON.stringify(nick), false); } catch (e) { console.error("저장 실패", e); }
    setNickname(nick);
    setBottles((prev) => [bottle, ...prev]);
    setCreating(false);
    if (filter !== "all" && filter !== fCat) setFilter("all");
    setPan(clampPan({ x: vp.w / 2 - bx * zoom, y: vp.h / 2 - by * zoom }));
  }

  async function deleteBottle(b) {
    try { await window.storage.delete("bottle:" + b.id, true); } catch (e) { console.error("삭제 실패", e); }
    setBottles((prev) => prev.filter((x) => x.id !== b.id));
    setConfirmDelete(false); setSelectedId(null);
  }

  async function refreshBottles() {
    try {
      const res = await window.storage.list("bottle:", true);
      const keys = (res && res.keys) || [];
      const loaded = [];
      for (const k of keys) { try { const r = await window.storage.get(k, true); if (r) loaded.push(JSON.parse(r.value)); } catch (e) {} }
      loaded.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      setBottles(loaded);
    } catch (e) {}
  }

  useEffect(() => { const t = setInterval(() => refreshBottles(), 20000); return () => clearInterval(t); }, []);

  function handleBottleClick(b) {
    if (drag.current.moved) return;
    setOpeningId(b.id);
    const a = getAnim(b);
    setTimeout(() => { setSelectedId(b.id); setOpeningId(null); setConfirmDelete(false); }, a.dur * 1000 + 120);
  }

  async function toggleReaction(bottle, key) {
    const rk = bottle.id + ":" + key;
    const has = !!myReactions[rk], delta = has ? -1 : 1;
    const newMy = { ...myReactions };
    if (has) delete newMy[rk]; else newMy[rk] = true;
    setMyReactions(newMy);
    setBottles((prev) => prev.map((b) => (b.id === bottle.id ? { ...b, reactions: { ...b.reactions, [key]: Math.max(0, (b.reactions[key] || 0) + delta) } } : b)));
    try {
      const r = await window.storage.get("bottle:" + bottle.id, true);
      const latest = r ? JSON.parse(r.value) : bottle;
      latest.reactions = latest.reactions || { heart: 0, yum: 0, fire: 0, up: 0 };
      latest.reactions[key] = Math.max(0, (latest.reactions[key] || 0) + delta);
      await window.storage.set("bottle:" + bottle.id, JSON.stringify(latest), true);
      setBottles((prev) => prev.map((b) => (b.id === bottle.id ? latest : b)));
      await window.storage.set("my-reactions", JSON.stringify(newMy), false);
    } catch (e) { console.error("리액션 저장 실패", e); }
  }

  async function addComment(bottle) {
    const text = commentText.trim();
    if (!text) return;
    const nick = nickname.trim() || "익명의 GNA 주민";
    const comment = { nickname: nick, text, createdAt: Date.now() };
    setCommentText("");
    try {
      const r = await window.storage.get("bottle:" + bottle.id, true);
      const latest = r ? JSON.parse(r.value) : bottle;
      latest.comments = [...(latest.comments || []), comment];
      await window.storage.set("bottle:" + bottle.id, JSON.stringify(latest), true);
      setBottles((prev) => prev.map((b) => (b.id === bottle.id ? latest : b)));
    } catch (e) { console.error("댓글 저장 실패", e); }
  }

  const selected = bottles.find((b) => b.id === selectedId);
  const opening = bottles.find((b) => b.id === openingId);
  const openAnim = opening ? getAnim(opening) : null;
  const visibleBottles = filter === "all" ? bottles : bottles.filter((b) => (b.category || "none") === filter);

  const mmView = { left: (-pan.x / zoom) * ms, top: (-pan.y / zoom) * ms, w: (vp.w / zoom) * ms, h: (vp.h / zoom) * ms };
  const ctrlBtn = "w-10 h-10 flex items-center justify-center bg-white/90 hover:bg-white text-teal-700 rounded-full shadow-lg border border-teal-100 active:scale-90 transition";

  return (
    <div className="min-h-screen w-full text-stone-700 select-none flex flex-col overflow-hidden" style={{ fontFamily: "'Jua', 'Gaegu', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap');
        @keyframes bob { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-8px) } }

        @keyframes washB { 0%,100%{ transform: translate(0px,-16px) } 50%{ transform: translate(-36px,30px) } }
        @keyframes washM { 0%,100%{ transform: translate(0px,-4px) } 50%{ transform: translate(26px,36px) } }
        @keyframes washF { 0%,100%{ transform: translate(0px,4px) } 50%{ transform: translate(-20px,50px) } }
        @keyframes seacrest { 0%{ transform: translateX(0) } 100%{ transform: translateX(-150px) } }
        @keyframes shimmer { 0%,100%{ opacity:0.3 } 50%{ opacity:0.75 } }
        @keyframes fadeup { 0%{ opacity:0; transform: translateY(14px) } 100%{ opacity:1; transform: translateY(0) } }
        @keyframes drift { 0%{ transform: translateX(-30px) } 100%{ transform: translateX(45px) } }
        @keyframes pop { 0%{ transform: scale(0.8); opacity:0 } 100%{ transform: scale(1); opacity:1 } }
        @keyframes sway { 0%,100%{ transform: rotate(-4deg) } 50%{ transform: rotate(4.5deg) } }
        @keyframes floaty { 0%,100%{ transform: translateY(0) rotate(-3deg) } 50%{ transform: translateY(-7px) rotate(3deg) } }
        @keyframes corkpop { 0%{ transform: translate(-50%,0) rotate(0deg); opacity:1 } 100%{ transform: translate(-50%,-150px) rotate(260deg); opacity:0 } }
        @keyframes corkbounce { 0%{ transform: translate(-50%,0) rotate(0deg); opacity:1 } 45%{ transform: translate(-50%,-135px) rotate(150deg); opacity:1 } 65%{ transform: translate(-50%,-95px) rotate(205deg); opacity:1 } 100%{ transform: translate(-50%,-175px) rotate(320deg); opacity:0 } }
        @keyframes corkspin { 0%{ transform: translate(-50%,0) rotate(0deg); opacity:1 } 100%{ transform: translate(-50%,-160px) rotate(560deg); opacity:0 } }
        @keyframes bottlewiggle { 0%,100%{ transform: rotate(0deg) } 20%{ transform: rotate(-5deg) } 40%{ transform: rotate(5deg) } 60%{ transform: rotate(-3deg) } 80%{ transform: rotate(2deg) } }
        @keyframes poptext { 0%{ transform: translate(-50%,10px) scale(0.5); opacity:0 } 40%{ transform: translate(-50%,-30px) scale(1.2); opacity:1 } 100%{ transform: translate(-50%,-65px) scale(1); opacity:0 } }
        @keyframes sparklefly { 0%{ transform: translate(0,0) scale(0.4); opacity:0 } 40%{ opacity:1 } 100%{ transform: var(--end); opacity:0 } }
        @keyframes dropletfly { 0%{ transform: translate(0,0) scale(0.4); opacity:0 } 25%{ opacity:0.9 } 100%{ transform: var(--dend); opacity:0 } }
        @keyframes fadehint { 0%,70%{opacity:1} 100%{opacity:0} }
        .bob { animation: bob 4s ease-in-out infinite; }
        .pop { animation: pop .25s ease-out; }
        .nobar::-webkit-scrollbar{ display:none }
      `}</style>

      {intro && (
        <div className="fixed inset-0 overflow-hidden" style={{ zIndex: 70 }}>

          {introStep === "beach" && (
            <div className="absolute top-6 left-1/2 -translate-x-1/2 bg-white/85 text-teal-800 text-sm px-4 py-2 rounded-full shadow" style={{ animation: "fadeup .6s ease both" }}>
              🚶 해변을 거니는 중… 저 멀리 무언가 떠밀려 와요 🌊
            </div>
          )}

          {introStep === "bottle" && (

          {introStep === "letter" && (

                  <div className="absolute -top-3 -right-2 text-3xl" style={{ transform: "rotate(12deg)" }}>🍶</div>

              <div>
                <label className="block text-sm text-stone-500 mb-1.5">🏷️ 주제 (병 겉면)</label>
                <input value={fTheme} onChange={(e) => setFTheme(e.target.value)} placeholder="예: 내방역 맛집 / 중드 추천" maxLength={40} className="w-full px-3 py-2.5 rounded-xl border-2 border-stone-200 text-sm text-stone-800 focus:outline-none focus:border-teal-400" />
              </div>
              <div>
                <label className="block text-sm text-stone-500 mb-1.5">💌 편지 내용 (공유할 항목)</label>
                <textarea value={fItems} onChange={(e) => setFItems(e.target.value)} rows={5} placeholder={"예:\n- 쿠마카레야 (일본식 카레)\n- 미하무\n- 미국식 다이너\n\n줄바꿈으로 여러 항목을 적어보세요!"} className="w-full px-3 py-2.5 rounded-xl border-2 border-stone-200 text-sm text-stone-800 focus:outline-none focus:border-teal-400 resize-none" />
              </div>

              <div>
                <label className="block text-sm text-stone-500 mb-2">🗂️ 주제 분류 <span className="text-stone-400">(선택)</span></label>
                <div className="flex flex-wrap gap-2">
                  <button onClick={() => setFCat("none")} className={`px-3 py-1.5 rounded-full text-sm border-2 transition ${fCat === "none" ? "bg-stone-700 text-white border-stone-700" : "bg-white text-stone-500 border-stone-200"}`}>분류 없음</button>
                  {CATEGORIES.map((c) => (
                    <button key={c.key} onClick={() => setFCat(c.key)} className={`px-3 py-1.5 rounded-full text-sm border-2 transition ${fCat === c.key ? "text-white" : "bg-white text-stone-500 border-stone-200"}`} style={fCat === c.key ? { background: c.color, borderColor: c.color } : undefined}>{c.icon} {c.label}</button>
                  ))}
                </div>
              </div>

              <div>
                <label className="block text-sm text-stone-500 mb-2">🎨 병 색 미리보기 <span className="text-stone-400">(분류에 따라 자동)</span></label>
                <div className="flex items-center gap-3 bg-stone-50 rounded-xl p-3">
                  <Bottle color={BOTTLE_COLORS[catColorIndex(fCat)]} scale={0.55} />
                  <p className="text-sm text-stone-500">
                    {fCat === "none" ? "분류를 고르면 그 색의 유리병이 돼요" : `'${catOf(fCat)?.label}' 유리병은 이 색이에요`}
                  </p>
                </div>
              </div>

              <div>
                <label className="block text-sm text-stone-500 mb-1.5">✍️ 닉네임</label>
                <input value={fNick} onChange={(e) => setFNick(e.target.value)} placeholder="본명이어도, 익명이어도 OK!" maxLength={20} className="w-full px-3 py-2.5 rounded-xl border-2 border-stone-200 text-sm text-stone-800 focus:outline-none focus:border-teal-400" />
              </div>

              <button onClick={saveBottle} disabled={!fTheme.trim() || !fItems.trim()} className="w-full bg-teal-500 hover:bg-teal-600 disabled:bg-stone-300 disabled:cursor-not-allowed active:scale-95 transition text-white py-3 rounded-2xl shadow-md text-lg">{editId ? "✏️ 수정 완료" : "🌊 해변에 띄우기"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
